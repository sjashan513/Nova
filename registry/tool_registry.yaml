tools:
    - name: "filesystem"
      description: "Read, write, and navigate operations in the local file system."
      module: "tools.filesystem"
    - name: "terminal"
      description: "Execute commands in the terminal."
      module: "tools.terminal"
    - name: "git"
      description: "Local and remote version control operations."
      module: "tools.git"
    - name: "vscode"
      description: "Integration to control the VS Code interface."
      module: "tools.vscode"

workers:
    # --- CODING domain ---
    - name: "worker_ts_check"
      description: "Runs tsc and returns structured compiler output. No LLM."
      module: "workers.coding.worker_ts_check"
    - name: "worker_ts_fix"
      description: "Fixes TypeScript errors with minimal changes only."
      module: "workers.coding.worker_ts_fix"
    - name: "worker_jsdoc"
      description: "Adds JSDoc to exported symbols. Never touches logic."
      module: "workers.coding.worker_jsdoc"
    - name: "worker_commit_msg"
      description: "Generates conventional commit messages from a diff."
      module: "workers.coding.worker_commit_msg"
    - name: "worker_diff_summary"
      description: "Plain language summary of a diff."
      module: "workers.coding.worker_diff_summary"
    - name: "worker_code_review"
      description: "Structured code review issues by severity."
      module: "workers.coding.worker_code_review"
    - name: "worker_refactor"
      description: "Applies one refactor pattern per call."
      module: "workers.coding.worker_refactor"
    - name: "worker_test_writer"
      description: "Language-agnostic test generation."
      module: "workers.coding.worker_test_writer"
    - name: "worker_test_runner"
      description: "Runs tests and returns structured results. No LLM."
      module: "workers.coding.worker_test_runner"
    - name: "worker_build"
      description: "Runs the build and returns structured output. No LLM."
      module: "workers.coding.worker_build"
    - name: "worker_dependency_check"
      description: "Checks for outdated or vulnerable dependencies. No LLM."
      module: "workers.coding.worker_dependency_check"

    # --- QA domain ---
    - name: "worker_qa_consolidate"
      description: "Merges multiple proposed versions of the same file into one."
      module: "workers.qa.worker_qa_consolidate"

    # --- ENVIRONMENT domain ---
    - name: "worker_env_snapshot"
      description: "Fetches VSCode editor state via the local HTTP extension. No LLM."
      module: "workers.environment.worker_env_snapshot"