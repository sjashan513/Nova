tools:
    - name: "filesystem"
      description: "Read, write, and navigate operations in the local file system."
      module: "tools.filesystem"
      actions:
        - name: "read"
          required_input_keys:
            - path
          output_keys:
            - content
          implicit_assumes:
            - op: FILE_EXISTS
              path: input.path

        - name: "write"
          required_input_keys:
            - path
            - content
          output_keys:
            - bytes_written
          implicit_assumes:
            - op: DIR_EXISTS
              path: input.path

        - name: "list"
          required_input_keys:
            - path
          output_keys:
            - entries
          implicit_assumes:
            - op: DIR_EXISTS
              path: input.path

    - name: "terminal"
      description: "Execute commands in the terminal."
      module: "tools.terminal"
      actions:
        - name: "run"
          required_input_keys:
            - command
            - args
          output_keys:
            - stdout
            - stderr
            - exit_code
          implicit_assumes:
            - op: COMMAND_EXISTS
              command: input.command

    - name: "git"
      description: "Local and remote version control operations."
      module: "tools.git"
      actions:
        - name: "status"
          required_input_keys:
            - path
          output_keys:
            - status
          implicit_assumes:
            - op: IS_GIT_REPO
              path: input.path

        - name: "commit"
          required_input_keys:
            - path
            - message
          output_keys:
            - sha
          implicit_assumes:
            - op: IS_GIT_REPO
              path: input.path

    - name: "vscode"
      description: "Integration to control the VS Code interface. show_diff is the ONLY way Nova proposes code changes -- never use filesystem.write to modify source files directly."
      module: "tools.vscode"
      actions:
        - name: "show_diff"
          required_input_keys:
            - file_path
            - proposed_content
          output_keys:
            - decision
            - applied
          implicit_assumes:
            - op: FILE_EXISTS
              path: input.file_path
            - op: SERVICE_REACHABLE
              host: localhost
              port: 3333

workers:
    - name: "worker_ts_check"
      description: "Runs tsc and returns structured compiler output. No LLM."
      module: "workers.coding.worker_ts_check"
      requires_model: false
      required_input_keys:
        - project
        - file_path
      output_keys:
        - errors
        - error_count
      implicit_assumes:
        - op: DIR_EXISTS
          path: project.path
        - op: FILE_EXISTS_IF_PRESENT
          path: input.file_path

    - name: "worker_ts_fix"
      description: "Fixes TypeScript errors with minimal changes only."
      module: "workers.coding.worker_ts_fix"
      requires_model: true
      default_model: "z-ai/glm-5.2"
      memory_critical: true
      memory_event_fields:
        - errors_resolved
        - changes_made
        - project
        - branch
      required_input_keys:
        - project
        - file_content
        - errors
      output_keys:
        - fixed_content
        - changes_made
      implicit_assumes:
        - op: DIR_EXISTS
          path: project.path
        - op: FILE_UNCHANGED
          ref_step: input.file_content
          ref_field: content

    - name: "worker_jsdoc"
      description: "Adds JSDoc to exported symbols. Never touches logic."
      module: "workers.coding.worker_jsdoc"
      requires_model: true
      default_model: "z-ai/glm-5.2"
      required_input_keys:
        - project
        - file_content
      output_keys:
        - documented_content
        - symbols_documented
      implicit_assumes:
        - op: DIR_EXISTS
          path: project.path
        - op: FILE_UNCHANGED
          ref_step: input.file_content
          ref_field: content

    - name: "worker_commit_msg"
      description: "Generates conventional commit messages from a diff."
      module: "workers.coding.worker_commit_msg"
      requires_model: true
      default_model: "z-ai/glm-5.2"
      memory_critical: true
      memory_event_fields:
        - message
        - project
        - branch
      required_input_keys:
        - project
        - diff
      output_keys:
        - message
      implicit_assumes:
        - op: DIR_EXISTS
          path: project.path
        - op: NOT_EMPTY
          ref_step: input.diff
          ref_field: stdout

    - name: "worker_diff_summary"
      description: "Plain language summary of a diff."
      module: "workers.coding.worker_diff_summary"
      requires_model: true
      default_model: "z-ai/glm-5.2"
      required_input_keys:
        - project
        - diff
      output_keys:
        - summary
      implicit_assumes:
        - op: DIR_EXISTS
          path: project.path
        - op: NOT_EMPTY
          ref_step: input.diff
          ref_field: stdout

    - name: "worker_code_review"
      description: "Structured code review issues by severity."
      module: "workers.coding.worker_code_review"
      requires_model: true
      default_model: "z-ai/glm-5.2"
      required_input_keys:
        - project
        - file_content
      output_keys:
        - issues
      implicit_assumes:
        - op: DIR_EXISTS
          path: project.path
        - op: FILE_UNCHANGED
          ref_step: input.file_content
          ref_field: content

    - name: "worker_refactor"
      description: "Applies one refactor pattern per call."
      module: "workers.coding.worker_refactor"
      requires_model: true
      default_model: "z-ai/glm-5.2"
      memory_critical: true
      memory_event_fields:
        - changes_made
        - project
        - branch
      required_input_keys:
        - project
        - file_content
        - pattern
      output_keys:
        - refactored_content
        - changes_made
      implicit_assumes:
        - op: DIR_EXISTS
          path: project.path
        - op: FILE_UNCHANGED
          ref_step: input.file_content
          ref_field: content

    - name: "worker_test_writer"
      description: "Language-agnostic test generation."
      module: "workers.coding.worker_test_writer"
      requires_model: true
      default_model: "z-ai/glm-5.2"
      required_input_keys:
        - project
        - file_content
      output_keys:
        - test_content
        - test_count
      implicit_assumes:
        - op: DIR_EXISTS
          path: project.path
        - op: FILE_UNCHANGED
          ref_step: input.file_content
          ref_field: content

    - name: "worker_build"
      description: "Runs the build and returns structured output. No LLM."
      module: "workers.coding.worker_build"
      requires_model: false
      required_input_keys:
        - project
      output_keys:
        - success
        - exit_code
        - output
      implicit_assumes:
        - op: DIR_EXISTS
          path: project.path

    - name: "worker_dependency_check"
      description: "Checks for outdated or vulnerable dependencies. No LLM."
      module: "workers.coding.worker_dependency_check"
      requires_model: false
      required_input_keys:
        - project
      output_keys:
        - outdated
        - vulnerabilities
      implicit_assumes:
        - op: DIR_EXISTS
          path: project.path

    - name: "worker_qa_consolidate"
      description: "Merges multiple proposed versions of the same file into one."
      module: "workers.qa.worker_qa_consolidate"
      requires_model: true
      default_model: "z-ai/glm-5.2"
      required_input_keys:
        - project
        - versions
      output_keys:
        - merged_content
      implicit_assumes:
        - op: DIR_EXISTS
          path: project.path

    - name: "worker_env_snapshot"
      description: "Fetches VSCode editor state via the local HTTP extension. No LLM."
      module: "workers.environment.worker_env_snapshot"
      requires_model: false
      required_input_keys: []
      output_keys:
        - active_file
        - project
        - branch
        - open_tabs
        - language
      implicit_assumes:
        - op: SERVICE_REACHABLE
          host: localhost
          port: 3333