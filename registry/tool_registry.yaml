tools:
    - name: "filesystem"
      description: "Read, write, and navigate operations in the local file system."
      module: "tools.filesystem"
    - name: "terminal"
      description: "Execute commands in the terminal."
      module: "tools.terminal"
    - name: "git"
      description: "Local and remote version control operations."
      module: "tools.git"
    - name: "vscode"
      description: "Integration to control the VS Code interface."
      module: "tools.vscode"

workers:
    - name: "coding_worker"
      description: "Specialist in writing, modifying, and refactoring source code."
      module: "workers.coding"
    - name: "qa_worker"
      description: "Specialist in code review, writing tests, and quality assurance."
      module: "workers.qa"
    - name: "environment_worker"
      description: "Specialist in managing dependencies and environment variables."
      module: "workers.environment"
